<div
  cdkDrag
  [cdkDragData]="task"
  class="bg-gray-50 rounded-lg border-l-4 border border-indigo-500 p-4 shadow-sm hover:shadow-md transition-all duration-200 cursor-grab active:cursor-grabbing group"
>
  <!-- class="w-full bg-gray-50 border border-gray-300 rounded-lg border-l-4
  border-indigo-500 p-4 shadow-md hover:shadow-xl hover:-translate-y-0.5
  transition-all duration-200 cursor-grab active:cursor-grabbing group" -->
  <!-- Priority Badge -->
  @if (task.priority) {
  <div class="flex justify-end mb-2">
    <span
      class="text-xs font-semibold px-2 py-1 rounded-full"
      [ngClass]="getPriorityColor(task.priority)"
    >
      {{ task.priority | uppercase }}
    </span>
  </div>
  }

  <!-- Task Title -->
  <p class="font-semibold text-gray-800 mb-3 text-base">{{ task.title }}</p>

  <!-- Task Description (if exists) -->
  @if (task.description) {
  <p class="text-sm text-gray-600 mb-3 line-clamp-2">{{ task.description }}</p>
  }

  <!-- Created Date -->
  <p class="text-xs text-gray-500 mb-3">
    📅 {{ getFormattedDate(task.createdAt) }}
  </p>

  <!-- Action Buttons -->
  <div class="flex gap-2">
    <button
      (click)="moveToTodo()"
      class="text-xs px-2 py-1 rounded bg-blue-100 text-blue-700 hover:bg-blue-200 transition-colors opacity-0 group-hover:opacity-100"
      title="Move to ToDo"
    >
      📋 Todo
    </button>
    <button
      (click)="moveToProgress()"
      class="text-xs px-2 py-1 rounded bg-amber-100 text-amber-700 hover:bg-amber-200 transition-colors opacity-0 group-hover:opacity-100"
      title="Move to In Progress"
    >
      ⚡ Progress
    </button>
    <button
      (click)="moveToDone()"
      class="text-xs px-2 py-1 rounded bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition-colors opacity-0 group-hover:opacity-100"
      title="Move to Done"
    >
      ✅ Done
    </button>
    <button
      (click)="deleteTask()"
      class="text-xs px-2 py-1 rounded bg-red-100 text-red-700 hover:bg-red-200 transition-colors ml-auto opacity-0 group-hover:opacity-100"
      title="Delete task"
    >
      🗑️ Delete
    </button>
  </div>
</div>
