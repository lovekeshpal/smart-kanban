<div class="h-full">
  <div class="bg-white rounded-xl shadow-md overflow-hidden flex flex-col h-full">
    <!-- Column Header -->
    <div [ngClass]="getColorClasses().header" class="p-4">
      <h3 class="text-lg font-bold">{{ title }}</h3>
      <p class="text-sm opacity-90 mt-1">{{ tasks.length || 0 }} task{{ tasks.length !== 1 ? 's' : '' }}</p>
    </div>

    <!-- Tasks Container -->
    <div 
      #dropListRef
      class="flex-1 overflow-y-auto p-4"
      [ngClass]="getColorClasses().bg"
      cdkDropList
      [cdkDropListData]="tasks"
      (cdkDropListDropped)="onTaskDropped($event)"
      cdkDropListSortingDisabled="true"
    >
      <div class="space-y-3">
        @for (task of tasks; track task.id) {
          <app-task-card
            [task]="task"
            cdkDrag
            [cdkDragData]="task">
          </app-task-card>
        }

        <!-- Empty State -->
        @if (!tasks || tasks.length === 0) {
          <div class="text-center py-12 text-gray-400">
            <p class="text-2xl mb-2">📭</p>
            <p class="text-sm">Drop tasks here</p>
          </div>
        }
      </div>
    </div>
  </div>
</div>
